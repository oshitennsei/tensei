<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:440px; height:280px; overflow:hidden;
  background:#0a0c14;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  position:relative;
}
.bg {
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 30% 60%, #1a2340 0%, #0a0c14 60%),
              linear-gradient(135deg, #0d1525 0%, #070910 100%);
}
.glow {
  position:absolute;
  width:300px; height:300px;
  background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
  top:-60px; right:-40px;
}
.glow2 {
  position:absolute;
  width:200px; height:200px;
  background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
  bottom:-40px; left:20px;
}
.lines {
  position:absolute; inset:0;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px),
                    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px);
}
.content {
  position:relative; z-index:10;
  display:flex; align-items:center;
  height:100%; padding:32px 36px;
  gap:28px;
}
.icon-wrap {
  flex-shrink:0;
  width:84px; height:84px;
  border-radius:20px;
  background:linear-gradient(135deg,#1e2a4a,#111827);
  border:1px solid rgba(99,102,241,0.35);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 30px rgba(99,102,241,0.2), 0 8px 24px rgba(0,0,0,0.5);
  overflow:hidden;
}
.icon-wrap img { width:72px; height:72px; }
.text { flex:1; }
.ja-title {
  font-size:11px; letter-spacing:0.2em;
  color:rgba(165,180,252,0.7);
  margin-bottom:6px;
  font-weight:400;
}
.name {
  font-size:28px; font-weight:800;
  color:#fff;
  letter-spacing:-0.5px;
  line-height:1;
  margin-bottom:4px;
}
.name span { color:#818cf8; }
.sub {
  font-size:11px; color:rgba(255,255,255,0.4);
  letter-spacing:0.05em;
  margin-bottom:16px;
}
.tagline {
  font-size:13.5px;
  color:rgba(255,255,255,0.82);
  line-height:1.55;
  font-weight:400;
}
.tagline strong { color:#a5b4fc; font-weight:600; }
.badge-row {
  display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;
}
.badge {
  font-size:10px; padding:3px 9px; border-radius:20px;
  background:rgba(99,102,241,0.15);
  border:1px solid rgba(99,102,241,0.3);
  color:#a5b4fc;
  letter-spacing:0.03em;
}
</style>
</head>
