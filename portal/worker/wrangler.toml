name = "tensei-portal-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "tensei-portal"
database_id = "3dea0593-1fd3-4bd9-89bd-66ea985b9f73"

[[kv_namespaces]]
binding = "MAGIC_LINK_KV"
id = "b32d14d8d1ad4f9ca83fd8fc977900a7"

[vars]
FRONTEND_URL = "https://tensei-portal.pages.dev"
WORKER_URL = "https://tensei-portal-api.tensei-portal.workers.dev"
GITHUB_REPO_OWNER = "Chakotay-Lee"
GITHUB_REPO_NAME = "tensei-authors"

# Secrets (set via `wrangler secret put`):
#   RESEND_API_KEY
#   SENDER_EMAIL      (verified Resend sender, e.g. noreply@yourdomain.com)
#   GITHUB_TOKEN
#   ADMIN_SECRET      (for admin endpoints)
